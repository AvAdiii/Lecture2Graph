name: Feature request
description: Suggest a new domain pack, provider, UI improvement, or export.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need is not covered today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What change would solve it?
    validations:
      required: true

